name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend.exe with PyInstaller
        run: >
          pyinstaller backend.py
          --name backend
          --onefile
          --noconfirm
          --clean
          --exclude-module PySide6
          --add-data "assets;assets"
          --distpath build/windows/dist
          --workpath build/windows/work
          --specpath build/windows

      - name: Place backend as Tauri sidecar
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          target_triple="$(rustc -vV | sed -n 's/host: //p')"
          cp build/windows/dist/backend.exe "app/src-tauri/binaries/backend-$target_triple.exe"

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: lota-launcher-windows
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
