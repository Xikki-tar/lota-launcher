name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      STATIC_VCRUNTIME: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            app/src-tauri
            updater/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const p of ['app/src-tauri/tauri.conf.json', 'app/package.json', 'updater/src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
            const cargoPath = 'app/src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(cargoPath, 'utf8');
            fs.writeFileSync(cargoPath, cargo.replace(/^version = \".*\"/m, 'version = \"$VERSION\"'));
          "

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend.exe with PyInstaller
        run: >
          pyinstaller backend.py
          --name backend
          --onefile
          --noconfirm
          --clean
          --exclude-module PySide6
          --add-data "${{ github.workspace }}\assets;assets"
          --distpath build/windows/dist
          --workpath build/windows/work
          --specpath build/windows

      - name: Build updater.exe
        run: |
          cargo clean --release --manifest-path updater/src-tauri/Cargo.toml -p updater
          cargo build --release --manifest-path updater/src-tauri/Cargo.toml

      - name: Place backend and updater as Tauri sidecars
        shell: bash
        run: |
          mkdir -p app/src-tauri/binaries
          target_triple="$(rustc -vV | sed -n 's/host: //p')"
          cp build/windows/dist/backend.exe "app/src-tauri/binaries/backend-$target_triple.exe"
          cp updater/src-tauri/target/release/updater.exe "app/src-tauri/binaries/updater-$target_triple.exe"

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri build

      - name: Package portable build (no installer)
        run: |
          New-Item -ItemType Directory -Path portable/lota-launcher-portable -Force
          Copy-Item app/src-tauri/target/release/lota-launcher.exe portable/lota-launcher-portable/
          Copy-Item app/src-tauri/target/release/backend.exe portable/lota-launcher-portable/
          Copy-Item updater/src-tauri/target/release/updater.exe portable/lota-launcher-portable/
          Compress-Archive -Path portable/lota-launcher-portable/* -DestinationPath lota-launcher-portable-windows.zip

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: lota-launcher-windows
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
            lota-launcher-portable-windows.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lota-launcher-portable-windows.zip
