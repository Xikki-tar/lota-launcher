name: AppImage Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            libfuse2 \
            python3-venv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build AppImage
        run: ./packaging/build-appimage.sh

      - name: Checksum
        # Апдейтер на Linux качает обновления прямо из GitHub Releases и
        # сверяет sha256, так что нужен файл рядом с самим AppImage, иначе
        # нечего сверять.
        run: |
          cd app/src-tauri/target/release/bundle/appimage
          for f in *.AppImage; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: lota-launcher-appimage
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/appimage/*.sha256

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/appimage/*.sha256
